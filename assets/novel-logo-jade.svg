<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13897d"/>
      <stop offset="0.55" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0a524b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf6e7"/>
      <stop offset="1" stop-color="#f1e3c5"/>
    </linearGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a2a16" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3a2a16" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3a2a16" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background field -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- soft contact shadow -->
  <ellipse cx="512" cy="666" rx="300" ry="46" fill="url(#shadow)"/>

  <!-- page-block thickness (behind) -->
  <g transform="translate(0,16)" fill="#e6d4ad">
    <path d="M512 404 C628 372 724 372 800 402 L800 596 C724 566 628 566 512 600 Z"/>
    <path d="M512 404 C396 372 300 372 224 402 L224 596 C300 566 396 566 512 600 Z"/>
  </g>

  <!-- open book: two pages -->
  <path d="M512 404 C628 372 724 372 800 402 L800 596 C724 566 628 566 512 600 Z" fill="url(#page)"/>
  <path d="M512 404 C396 372 300 372 224 402 L224 596 C300 566 396 566 512 600 Z" fill="url(#page)"/>

  <!-- center spine fold -->
  <rect x="500" y="404" width="24" height="196" fill="url(#spine)"/>

  <!-- text lines (right page) -->
  <g fill="#0f766e" opacity="0.42">
    <rect x="566" y="450" width="180" height="13" rx="6.5"/>
    <rect x="566" y="486" width="200" height="13" rx="6.5"/>
    <rect x="566" y="522" width="160" height="13" rx="6.5"/>
    <rect x="566" y="558" width="120" height="13" rx="6.5"/>
  </g>
  <!-- text lines (left page) -->
  <g fill="#0f766e" opacity="0.42">
    <rect x="278" y="450" width="180" height="13" rx="6.5"/>
    <rect x="258" y="486" width="200" height="13" rx="6.5"/>
    <rect x="298" y="522" width="160" height="13" rx="6.5"/>
    <rect x="338" y="558" width="120" height="13" rx="6.5"/>
  </g>

  <!-- seal-red bookmark ribbon -->
  <path d="M540 350 L584 350 L584 478 L562 452 L540 478 Z" fill="#b23b2e"/>
  <rect x="568" y="350" width="16" height="128" fill="#000000" opacity="0.12"/>
  <rect x="540" y="350" width="6" height="128" fill="#ffffff" opacity="0.16"/>
</svg>
